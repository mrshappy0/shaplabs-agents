name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to Unraid
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: o0atomos0o/mastra-app:latest

      # Joins the runner to your Tailnet as an ephemeral node.
      # The node disappears automatically when the job ends.
      - name: Connect to Tailnet
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UNRAID_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # StrictHostKeyChecking=no is acceptable here because the connection
      # travels over Tailscale's authenticated, encrypted overlay network.
      - name: Deploy docker-compose.yml to Unraid
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.UNRAID_SSH_USER }}@${{ secrets.UNRAID_HOST }}:/boot/config/plugins/compose.manager/projects/mastra-app/docker-compose.yml

      - name: Pull new image & restart stack
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.UNRAID_SSH_USER }}@${{ secrets.UNRAID_HOST }} \
            "cd /boot/config/plugins/compose.manager/projects/mastra-app && docker compose pull && docker compose down && docker compose up -d --remove-orphans"
