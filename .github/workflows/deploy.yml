name: Build & Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    name: Build, Push & Deploy to Unraid
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: o0atomos0o/mastra-app:latest
          cache-from: type=registry,ref=o0atomos0o/mastra-app:buildcache
          cache-to: type=registry,ref=o0atomos0o/mastra-app:buildcache,mode=max

      # Joins the runner to your Tailnet as an ephemeral node.
      # The node disappears automatically when the job ends.
      - name: Connect to Tailnet
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.UNRAID_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      # StrictHostKeyChecking=no is acceptable here because the connection
      # travels over Tailscale's authenticated, encrypted overlay network.
      - name: Deploy docker-compose.yml to Unraid
        run: |
          scp -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.UNRAID_SSH_USER }}@${{ secrets.UNRAID_HOST }}:/boot/config/plugins/compose.manager/projects/mastra-app/docker-compose.yml

      - name: Pull new image & restart mastra
        run: |
          ssh -o StrictHostKeyChecking=no \
            ${{ secrets.UNRAID_SSH_USER }}@${{ secrets.UNRAID_HOST }} \
            "cd /boot/config/plugins/compose.manager/projects/mastra-app && docker compose pull mastra && docker compose up -d --no-deps mastra"
